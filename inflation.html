<title>Inflation Calculator India | Real Value</title>

<meta name="description" content="Calculate inflation adjusted returns. Know real value of your investments.">

<input type="number" id="amount" placeholder="Investment">
<input type="number" id="rate" placeholder="Return %">
<input type="number" id="years" placeholder="Years">
<input type="number" id="inflation" value="6">

<script>
function calc(){
let P=Number(amount.value);
let r=Number(rate.value)/100;
let n=Number(years.value);
let i=Number(inflation.value)/100;

let FV=P*Math.pow(1+r,n);
let real=FV/Math.pow(1+i,n);

output.innerHTML="Future Value: ₹"+Math.round(FV)+"<br>Real Value: ₹"+Math.round(real);
}
</script>
