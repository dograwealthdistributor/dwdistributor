<!DOCTYPE html>
<html>
<head>
<title>Inflation Calculator</title>
<meta name="description" content="Inflation adjusted investment calculator India.">
</head>
<body>

<h2>Inflation Calculator</h2>

<input id="amt" placeholder="Investment">
<input id="rate" placeholder="Return %">
<input id="yrs" placeholder="Years">
<input id="inf" value="6" placeholder="Inflation %">

<button onclick="calc()">Calculate</button>

<p id="out"></p>

<script>
function calc(){
let P=amt.value,r=rate.value/100,n=yrs.value,i=inf.value/100;
let FV=P*Math.pow(1+r,n);
let real=FV/Math.pow(1+i,n);

out.innerHTML="Future ₹"+Math.round(FV)+" Real ₹"+Math.round(real);
}
</script>

</body>
</html>
