<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Inflation Calculator</title>
</head>

<body>

<h2>Inflation Calculator</h2>

<input id="p" placeholder="Investment">
<input id="r" placeholder="Return %">
<input id="y" placeholder="Years">
<input id="i" value="6" placeholder="Inflation %">

<button onclick="calc()">Calculate</button>

<p id="out"></p>

<script>
function calc(){
let P=p.value,r=r.value/100,y1=y.value,i1=i.value/100;
let FV=P*Math.pow(1+r,y1);
let real=FV/Math.pow(1+i1,y1);

out.innerHTML="Future ₹"+Math.round(FV)+" Real ₹"+Math.round(real);
}
</script>

</body>
</html>
