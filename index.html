<script>

let sipChart, lumChart, swpChart;

// ===== SIP =====
function calcSIP(){
let P = Number(document.getElementById("sip_amount").value);
let r = Number(document.getElementById("sip_rate").value)/100/12;
let n = Number(document.getElementById("sip_years").value)*12;

if(!P || !r || !n) return;

let FV = P * (((Math.pow(1+r,n)-1)/r)*(1+r));
let invested = P*n;
let gain = FV - invested;

let output = document.getElementById("sip_output");

output.innerHTML =
"Invested: ₹"+invested.toLocaleString()+"<br>Final: ₹"+Math.round(FV).toLocaleString()+
`<br><button class="btn" onclick="sendWhatsApp('SIP', ${P}, ${r*1200}, ${n/12}, ${Math.round(FV)})">Send to WhatsApp</button>`;

if(sipChart) sipChart.destroy();

sipChart = new Chart(document.getElementById("sip_chart"),{
type:'pie',
data:{
labels:['Invested','Gain'],
datasets:[{data:[invested,gain]}]
}
});
}

// ===== LUMPSUM =====
function calcLump(){
let P = Number(document.getElementById("lum_amount").value);
let r = Number(document.getElementById("lum_rate").value)/100;
let n = Number(document.getElementById("lum_years").value);

if(!P || !r || !n) return;

let FV = P*Math.pow(1+r,n);
let gain = FV-P;

let output = document.getElementById("lum_output");

output.innerHTML =
"Invested: ₹"+P.toLocaleString()+"<br>Final: ₹"+Math.round(FV).toLocaleString()+
`<br><button class="btn" onclick="sendWhatsApp('Lumpsum', ${P}, ${r*100}, ${n}, ${Math.round(FV)})">Send to WhatsApp</button>`;

if(lumChart) lumChart.destroy();

lumChart = new Chart(document.getElementById("lum_chart"),{
type:'pie',
data:{
labels:['Invested','Gain'],
datasets:[{data:[P,gain]}]
}
});
}

// ===== SWP =====
function calcSWP(){
let corpus = Number(document.getElementById("swp_corpus").value);
let withdrawal = Number(document.getElementById("swp_withdrawal").value);
let rate = Number(document.getElementById("swp_rate").value)/100/12;

if(!corpus || !withdrawal || !rate) return;

let months = Math.log(withdrawal/(withdrawal - corpus*rate))/Math.log(1+rate);
let totalWithdrawn = withdrawal * months;

let output = document.getElementById("swp_output");

output.innerHTML =
"Duration: "+Math.round(months)+" months<br>Withdrawn: ₹"+Math.round(totalWithdrawn).toLocaleString()+
`<br><button class="btn" onclick="sendWhatsApp('SWP', ${corpus}, ${rate*1200}, 'Monthly '+${withdrawal}, ${Math.round(totalWithdrawn)})">Send to WhatsApp</button>`;

if(swpChart) swpChart.destroy();

swpChart = new Chart(document.getElementById("swp_chart"),{
type:'pie',
data:{
labels:['Withdrawn'],
datasets:[{data:[totalWithdrawn]}]
}
});
}

// ===== WHATSAPP =====
function sendWhatsApp(type, amount, rate, duration, result){

let message =
"Hi Sunil Ji,\n" +
"I used your " + type + " calculator:\n" +
"Amount: ₹" + amount + "\n" +
"Return: " + rate + "%\n" +
"Duration: " + duration + "\n" +
"Result: ₹" + result + "\n" +
"Please guide me further.";

let url = "https://wa.me/919463665032?text=" + encodeURIComponent(message);

window.open(url, '_blank');
}

</script>
