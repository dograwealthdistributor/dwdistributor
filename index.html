<section>
<h2>Financial Calculators</h2>

<div class="services">

<!-- Lumpsum ONLY -->
<div class="card">
<h3>FD/Lumpsum Calculator</h3>
<input type="number" id="lum_amount" placeholder="Total Investment">
<input type="number" id="lum_rate" placeholder="Expected Return Rate % (p.a.)">
<input type="number" id="lum_years" placeholder="Time Period (Years)">
<button class="btn" onclick="calcLump()">Calculate</button>
<p class="result" id="lum_output"></p>
<canvas id="lum_chart"></canvas>
</div>

</div>

<!-- LINKS -->
<div style="margin-top:30px;">
<a class="btn" href="sip.html">SIP Calculator</a>
<a class="btn" href="swp.html">SWP Calculator</a>
<a class="btn" href="inflation.html">Inflation Calculator</a>
</div>

</section>

<script>
let lumChart;

function calcLump(){
let P=Number(lum_amount.value),r=Number(lum_rate.value)/100,n=Number(lum_years.value);
if(!P||!r||!n)return;
let FV=P*Math.pow(1+r,n),gain=FV-P;
lum_output.innerHTML="Invested: ₹"+P.toLocaleString()+"<br>Final: ₹"+Math.round(FV).toLocaleString();
if(lumChart)lumChart.destroy();
lumChart=new Chart(lum_chart,{type:'pie',data:{labels:['Invested','Gain'],datasets:[{data:[P,gain]}]}});
}
</script>
