<!DOCTYPE html>
<html>
<head>
<title>SIP Calculator</title>
<meta name="description" content="SIP calculator India to calculate mutual fund returns.">
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>
<body>

<h2>SIP Calculator</h2>

<input id="amt" placeholder="Monthly Investment">
<input id="rate" placeholder="Return %">
<input id="yrs" placeholder="Years">

<button onclick="calc()">Calculate</button>

<p id="out"></p>

<script>
function calc(){
let P=amt.value,r=rate.value/100/12,n=yrs.value*12;
let FV=P*(((Math.pow(1+r,n)-1)/r)*(1+r));
out.innerHTML="Final: ₹"+Math.round(FV);
}
</script>

</body>
</html>
