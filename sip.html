<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>SIP Calculator</title>
<meta name="description" content="SIP return calculator India">
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>

<body>

<!-- COPY HEADER + LEAD + FOOTER EXACT SAME FROM index.html -->

<h2 style="text-align:center">SIP Calculator</h2>

<div class="card">
<input id="amt" placeholder="Monthly Investment">
<input id="rate" placeholder="Return %">
<input id="yrs" placeholder="Years">
<button onclick="calc()">Calculate</button>
<p id="out"></p>
<canvas id="chart"></canvas>
</div>

<script>
let chart;
function calc(){
let P=amt.value,r=rate.value/100/12,n=yrs.value*12;
let FV=P*(((Math.pow(1+r,n)-1)/r)*(1+r));
out.innerHTML="Final ₹"+Math.round(FV);

if(chart) chart.destroy();
chart=new Chart(chart,{
type:'pie',
data:{labels:['Invested','Gain'],datasets:[{data:[P*n,FV-(P*n)]}]}
});
}
</script>

</body>
</html>
