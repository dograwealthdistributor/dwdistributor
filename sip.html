<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Dogra Wealth Distributor</title>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<link rel="stylesheet" href="style.css">
</head>
<section>
<h2>SIP Calculator</h2>

<div class="services">

<div class="card">
<h3>SIP Calculator</h3>
<input type="number" id="sip_amount" placeholder="Monthly Investment">
<input type="number" id="sip_rate" placeholder="Expected Return Rate % (p.a.)">
<input type="number" id="sip_years" placeholder="SIP Years">
<button class="btn" onclick="calcSIP()">Calculate</button>
<p class="result" id="sip_output"></p>
<canvas id="sip_chart"></canvas>
</div>

</div>

<div style="margin-top:30px;">
<a class="btn" href="index.html">Lumpsum</a>
<a class="btn" href="swp.html">SWP</a>
<a class="btn" href="inflation.html">Inflation</a>
</div>

</section>

<script>
let sipChart;

function calcSIP(){
let P=Number(sip_amount.value),r=Number(sip_rate.value)/100/12,n=Number(sip_years.value)*12;
if(!P||!r||!n)return;
let FV=P*(((Math.pow(1+r,n)-1)/r)*(1+r)),invested=P*n,gain=FV-invested;
sip_output.innerHTML="Invested: ₹"+invested.toLocaleString()+"<br>Final: ₹"+Math.round(FV).toLocaleString();
if(sipChart)sipChart.destroy();
sipChart=new Chart(sip_chart,{type:'pie',data:{labels:['Invested','Gain'],datasets:[{data:[invested,gain]}]}});
}
</script>
