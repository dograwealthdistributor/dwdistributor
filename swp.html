<title>SWP Calculator | Monthly Income Planner</title>

<meta name="description" content="Plan monthly income using SWP calculator. Know withdrawal and remaining corpus.">

<input type="number" id="corpus" placeholder="Total Investment">
<input type="number" id="withdrawal" placeholder="Monthly Income">
<input type="number" id="rate" placeholder="Return %">
<input type="number" id="years" placeholder="Years">

<script>
function calc(){
let c=Number(corpus.value);
let w=Number(withdrawal.value);
let r=Number(rate.value)/100/12;
let y=Number(years.value)*12;

let bal=c,total=0;

for(let i=0;i<y;i++){
bal*=1+r;
if(bal<w){total+=bal;bal=0;break;}
bal-=w;
total+=w;
}

output.innerHTML="Total Withdrawn: ₹"+Math.round(total)+"<br>Remaining: ₹"+Math.round(bal);
}
</script>
