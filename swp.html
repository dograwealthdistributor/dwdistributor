<!DOCTYPE html>
<html>
<head>
<title>SWP Calculator</title>
<meta name="description" content="SWP calculator to plan monthly income.">
</head>
<body>

<h2>SWP Calculator</h2>

<input id="corpus" placeholder="Investment">
<input id="withdrawal" placeholder="Monthly Income">
<input id="rate" placeholder="Return %">
<input id="years" placeholder="Years">

<button onclick="calc()">Calculate</button>

<p id="out"></p>

<script>
function calc(){
let c=corpus.value,w=withdrawal.value,r=rate.value/100/12,y=years.value*12;
let bal=c,total=0;

for(let i=0;i<y;i++){
bal*=1+r;
bal-=w;
total+=w;
}

out.innerHTML="Withdrawn ₹"+Math.round(total)+" Remaining ₹"+Math.round(bal);
}
</script>

</body>
</html>
